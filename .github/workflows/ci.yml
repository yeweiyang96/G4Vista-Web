name: G4Vista CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4.1.0
        with:
          version: 2026.6.3
          install: true
          cache: true
          experimental: true

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(mise exec -- pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Run CI
        run: mise run ci
