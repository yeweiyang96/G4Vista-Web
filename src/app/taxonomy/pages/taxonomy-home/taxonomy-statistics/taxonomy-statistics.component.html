<div class="taxonomy-statistics">
  <div class="statistics-heading">
    <h2 class="g4v-panel-title">Assembly-rich groups</h2>
    <p class="g4v-subtitle">Common branches with available G4ViSTA genome assemblies.</p>
  </div>
  <div class="stats-grid">
    @for (stat of taxonomyStats(); track stat.category) {
      <a [routerLink]="['/taxonomy', stat.taxon_id]" class="stat-card">
        <div class="category">{{ stat.category }}</div>
        <div class="count">{{ stat.assemblyCount }}</div>
        <div class="label">genomes</div>
      </a>
    }
  </div>
</div>
