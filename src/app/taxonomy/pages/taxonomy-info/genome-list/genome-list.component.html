<mat-form-field appearance="outline">
  <mat-label>Search</mat-label>
  <input matInput (keyup)="applyFilter($event)" #input />
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>
    <!-- Name Column -->
    <ng-container matColumnDef="asm_name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Assembly</th>
      <td mat-cell *matCellDef="let row">
        <a class="genome-link" [routerLink]="['/genome', row.assembly_accession]">{{
          row.asm_name
        }}</a>
      </td>
    </ng-container>

    <!-- Species Column -->
    <ng-container matColumnDef="organism_name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Scientific name</th>
      <td mat-cell *matCellDef="let row">{{ row.organism_name }}</td>
    </ng-container>

    <!-- RefSeq Column -->
    <ng-container matColumnDef="assembly_accession">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>RefSeq</th>
      <td mat-cell *matCellDef="let row">{{ row.assembly_accession }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <!-- Row shown when there is no matching data. -->
    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" colspan="3">No data matching the filter "{{ input.value }}"</td>
    </tr>
  </table>

  <mat-paginator
    [pageSizeOptions]="[5, 10, 25, 100]"
    aria-label="Select page of users"
  ></mat-paginator>
</div>
