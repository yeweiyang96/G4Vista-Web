<header>
  <nav class="navbar" aria-label="Top Toolbar">
    <button mat-button routerLink="/" aria-label="Home">
      <app-logo class="navbar-logo" matButtonIcon />
      G4Vista
    </button>
    @for (section of sections; track $index) {
      <a mat-button class="navbar-items" [routerLink]="section.route" routerLinkActive="selected">{{
        section.name
      }}</a>
    }
    <div class="flex-spacer"></div>

    <button mat-icon-button (click)="toggleTheme()" aria-label="Toggle Theme" class="theme-button">
      <mat-icon class="icon">{{ theme() }}</mat-icon>
    </button>
    <a
      mat-button
      class="navbar-items"
      href="https://github.com/yeweiyang96/g4vista"
      aria-label="GitHub Repository"
      target="_blank"
    >
      <mat-icon
        class="icon"
        svgIcon="github"
        aria-hidden="false"
        aria-label="Github SVG icon"
      ></mat-icon>
      GitHub
    </a>
    <a
      mat-icon-button
      class="small-screen"
      href="https://github.com"
      aria-label="GitHub Repository"
      target="_blank"
    >
      <mat-icon
        class="icon"
        svgIcon="github"
        aria-hidden="false"
        aria-label="Github SVG icon"
      ></mat-icon>
    </a>
  </nav>
  <nav class="navbar small-screen" aria-label="Section Nav Bar">
    @for (section of sections; track $index) {
      <a mat-button class="navbar-link" [routerLink]="section.route" routerLinkActive="selected">{{
        section.name
      }}</a>
    }
  </nav>
</header>

<router-outlet />
<footer class="footer">
  <div class="footer-left">
    <app-logo class="logo" />
    <a href="https://bioinfo.med.niigata-u.ac.jp/" target="_blank">Medical AI Center</a>
  </div>
  <div class="footer-right">
    <div>
      <span>Powered by Medical AI Center ©2013-{{ year }}.</span>
      <a href="https://opensource.org/license/mit" target="_blank"
        >Code licensed under an MIT-style License.</a
      >
      <span>Documentation licensed under CC BY 4.0.</span>
    </div>
  </div>
</footer>
