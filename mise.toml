[tools]
node = '24'
pnpm = '11.6.0'

[settings]
experimental = true

[env]
MISE_DATA_DIR = "{{env.MISE_DATA_DIR | default(value=env.HOME ~ '/.local/share/mise')}}"
_.path = ["{{config_root}}/node_modules/.bin", "{{env.MISE_DATA_DIR}}/installs/pnpm/11.6.0"]

[tasks.pnpm-install]
description = 'Installs dependencies with pnpm'
run = 'pnpm install'
sources = ['package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml', 'mise.toml']
outputs = ['node_modules/.pnpm/lock.yaml']

[tasks.pnpm-install-frozen]
description = 'Installs dependencies with the committed pnpm lockfile'
run = 'pnpm install --frozen-lockfile'
sources = ['package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml', 'mise.toml']
outputs = ['node_modules/.pnpm/lock.yaml']

[tasks.lint]
description = 'Runs the Angular lint checks'
run = 'pnpm run lint'
depends = ['pnpm-install']

[tasks.build]
description = 'Builds the production application bundle'
run = 'pnpm run build'
depends = ['pnpm-install']

[tasks.ci]
description = 'Runs the CI validation sequence'
run = [
  'pnpm install --frozen-lockfile',
  'pnpm run lint',
  'pnpm run build',
]

[tasks.dev]
description = 'Starts the development server'
run = 'ng serve --host 0.0.0.0 --port 4201 --allowed-hosts --live-reload true --hmr false'
depends = ['pnpm-install']
